<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoes Style</title>
  <style>
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f4f9;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .navbar {
      display: flex;
      justify-content: center;
      gap: 15px;
      background-color: #fff;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background-color: #e2e8f0;
      color: #1a202c;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .nav-btn:hover {
      background-color: #cbd5e1;
    }

    .nav-btn.active {
      background-color: #2563eb;
      color: #ffffff;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background-color: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 15px rgba(0, 0, 0, 0.12);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .card-info {
      padding: 15px;
      text-align: center;
    }

    .card-info h3 {
      margin: 0;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>Catálogo Shoes Style</h1>

  <nav class="navbar">
    <button class="nav-btn active" onclick="filtrarZapatos('todos', this)">Todos</button>
    <button class="nav-btn" onclick="filtrarZapatos('deportivos', this)">Deportivos</button>
    <button class="nav-btn" onclick="filtrarZapatos('formales', this)">Formales</button>
    <button class="nav-btn" onclick="filtrarZapatos('casuales', this)">Casuales</button>
  </nav>

  <section class="gallery" id="gallery"></section>

  <script>
    
    const zapatos = [
      { id: 1, categoria: 'deportivos', titulo: 'Deportivo Running', img: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500' },
      { id: 2, categoria: 'deportivos', titulo: 'Sneaker', img: 'https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=500' },
      { id: 3, categoria: 'deportivos', titulo: 'Calzado Atletismo', img: 'https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=500' },
      { id: 4, categoria: 'formales', titulo: 'Mocasín de Cuero', img: 'https://images.unsplash.com/photo-1614252235316-8c857d38b5f4?w=500' },
      { id: 5, categoria: 'formales', titulo: 'Zapato de Vestir', img: 'https://images.unsplash.com/photo-1533867617858-e7b97e060509?w=500' },
      { id: 6, categoria: 'casuales', titulo: 'Zapato Lona Urbano', img: 'https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=500' },
      { id: 7, categoria: 'casuales', titulo: 'Sneaker Blanco', img: 'https://images.unsplash.com/photo-1560769629-975ec94e6a86?w=500' },

    ];

    const gallery = document.getElementById('gallery');

   
    function cargarGaleria(lista) {
      gallery.innerHTML = '';
      lista.forEach(zapato => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="${zapato.img}" alt="${zapato.titulo}" loading="lazy">
          <div class="card-info">
            <h3>${zapato.titulo}</h3>
          </div>
        `;
        gallery.appendChild(card);
      });
    }

    
    function filtrarZapatos(categoria, boton) {
      
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      boton.classList.add('active');

      
      if (categoria === 'todos') {
        cargarGaleria(zapatos);
      } else {
        const filtrados = zapatos.filter(z => z.categoria === categoria);
        cargarGaleria(filtrados);
      }
    }

    cargarGaleria(zapatos);
  </script>
</body>
</html>
